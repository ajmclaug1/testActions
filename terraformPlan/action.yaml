name: terraform plan
description: terraform plan and setup steps 
inputs:
  ARN_ROLE: 
    description: arn role to assume
    required: true
  WORKDIR:
    description: location tf config
    required: true
  test:
    description: test
    required: false

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name : echo AWS credentials
      shell: bash
      run: echo ${{ inputs.test }}
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@main # Or a specific version
      with:
        role-to-assume: ${{ inputs.ARN_ROLE }}
        aws-region: eu-west-2
    - name: Additional steps
      run: |
        # Your commands that require AWS credentials
        aws ec2 describe-instances --region eu-west-2 --output table
      shell: bash
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1
    - name: Terraform Init
      run: terraform init
      shell: bash
      working-directory: ${{ inputs.WORKDIR }}
    - name: Terraform plan
      run: terraform plan -input=false
      shell: bash
      working-directory: ${{ inputs.WORKDIR }}